<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biolab Admin — Главная</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🌱 Biolab</h2>
                <p id="adminUsername">Администратор</p>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="active"><span aria-hidden="true">📊</span><span>Главная</span></a>
                <a href="products.html"><span aria-hidden="true">🌿</span><span>Товары</span></a>
                <a href="orders.html"><span aria-hidden="true">📦</span><span>Заказы</span></a>
                <a href="categories.html"><span aria-hidden="true">📁</span><span>Категории</span></a>
                <a href="settings.html"><span aria-hidden="true">⚙️</span><span>Настройки</span></a>
                <a href="#" id="logoutBtn"><span aria-hidden="true">🚪</span><span>Выход</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>Панель управления</h1>
                <div class="user-info"><span id="currentDate"></span></div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" aria-hidden="true">🌿</div>
                    <div class="stat-info"><h3 id="totalProducts">0</h3><p>Всего товаров</p></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" aria-hidden="true">📦</div>
                    <div class="stat-info"><h3 id="totalOrders">0</h3><p>Всего заказов</p></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" aria-hidden="true">⏳</div>
                    <div class="stat-info"><h3 id="pendingOrders">0</h3><p>Ожидают выдачи</p></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" aria-hidden="true">✅</div>
                    <div class="stat-info"><h3 id="completedOrders">0</h3><p>Выполнено</p></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" aria-hidden="true">💰</div>
                    <div class="stat-info"><h3 id="totalRevenue">0 ₽</h3><p>Выручка</p></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Последние заказы</h2>
                    <a href="orders.html" class="btn btn-primary btn-small">Все заказы</a>
                </div>
                <div id="recentOrdersContainer"><div class="loading">Загрузка...</div></div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Товары с низким остатком</h2>
                    <a href="products.html" class="btn btn-primary btn-small">Все товары</a>
                </div>
                <div id="lowStockContainer"><div class="loading">Загрузка...</div></div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
