<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление товарами - Biolab Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🌱 Biolab</h2>
                <p id="adminUsername">Администратор</p>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html">
                    <span>📊</span>
                    <span>Главная</span>
                </a>
                <a href="products.html" class="active">
                    <span>🌿</span>
                    <span>Товары</span>
                </a>
                <a href="orders.html">
                    <span>📦</span>
                    <span>Заказы</span>
                </a>
                <a href="categories.html">
                    <span>📁</span>
                    <span>Категории</span>
                </a>
                <a href="#" id="logoutBtn">
                    <span>🚪</span>
                    <span>Выход</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>Управление товарами</h1>
                <button class="btn btn-primary" id="addProductBtn">+ Добавить товар</button>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Все товары</h2>
                    <div style="display: flex; gap: 10px;">
                        <select id="categoryFilter" class="form-control">
                            <option value="">Все категории</option>
                        </select>
                        <input type="text" id="searchInput" placeholder="Поиск..." style="padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 8px;">
                    </div>
                </div>
                <div id="productsContainer">
                    <div class="loading">Загрузка товаров...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Модальное окно добавления/редактирования товара -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Добавить товар</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <form id="productForm">
                <input type="hidden" id="productId">

                <div class="form-group">
                    <label for="title">Название *</label>
                    <input type="text" id="title" name="title" required>
                </div>

                <div class="form-group">
                    <label for="description">Описание *</label>
                    <textarea id="description" name="description" required></textarea>
                </div>

                <div class="form-group">
                    <label for="price">Цена (₽) *</label>
                    <input type="number" id="price" name="price" min="0" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="category">Категория *</label>
                    <select id="category" name="category" required>
                        <option value="">Выберите категорию</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="stock">Остаток *</label>
                    <input type="number" id="stock" name="stock" min="0" required>
                </div>

                <div class="form-group">
                    <label for="size">Размер карточки</label>
                    <select id="size" name="size">
                        <option value="normal">Обычная</option>
                        <option value="wide">Широкая</option>
                        <option value="large">Большая</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="image">Изображение</label>
                    <input type="file" id="image" name="image" accept="image/*">
                    <img id="imagePreview" class="image-preview" style="display: none;">
                </div>

                <div class="form-group">
                    <label for="modelUrl">URL 3D модели (опционально)</label>
                    <input type="url" id="modelUrl" name="modelUrl" placeholder="https://...">
                </div>

                <div id="formMessage" style="display: none; margin-bottom: 15px;"></div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Отмена</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
