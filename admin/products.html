<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление товарами — Biolab Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🌱 Biolab</h2>
                <p id="adminUsername">Администратор</p>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html"><span aria-hidden="true">📊</span><span>Главная</span></a>
                <a href="products.html" class="active"><span aria-hidden="true">🌿</span><span>Товары</span></a>
                <a href="orders.html"><span aria-hidden="true">📦</span><span>Заказы</span></a>
                <a href="categories.html"><span aria-hidden="true">📁</span><span>Категории</span></a>
                <a href="settings.html"><span aria-hidden="true">⚙️</span><span>Настройки</span></a>
                <a href="#" id="logoutBtn"><span aria-hidden="true">🚪</span><span>Выход</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>Управление товарами</h1>
                <button class="btn btn-primary" id="addProductBtn">+ Добавить товар</button>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Все товары</h2>
                    <div style="display:flex;gap:10px;">
                        <label class="visually-hidden" for="categoryFilter">Категория</label>
                        <select id="categoryFilter" class="form-control">
                            <option value="">Все категории</option>
                        </select>
                        <label class="visually-hidden" for="searchInput">Поиск</label>
                        <input type="text" id="searchInput" placeholder="Поиск..." style="padding:8px 12px;border:1px solid var(--border-color);border-radius:8px;">
                    </div>
                </div>
                <div id="productsContainer"><div class="loading">Загрузка товаров...</div></div>
            </div>
        </main>
    </div>

    <div id="productModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Добавить товар</h2>
                <button class="close-modal" id="closeModal" type="button" aria-label="Закрыть">&times;</button>
            </div>
            <form id="productForm" autocomplete="off">
                <input type="hidden" id="productId">

                <div class="form-group">
                    <label for="title">Название *</label>
                    <input type="text" id="title" name="title" maxlength="200" required>
                </div>

                <div class="form-group">
                    <label for="description">Описание *</label>
                    <textarea id="description" name="description" maxlength="2000" required></textarea>
                </div>

                <div class="form-group">
                    <label for="price">Цена (₽) *</label>
                    <input type="number" id="price" name="price" min="0" max="1000000" step="1" required>
                </div>

                <div class="form-group" style="background: rgba(255,107,107,0.1); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,107,107,0.3);">
                    <label for="salePrice" style="color: #ff6b6b;">Акционная цена</label>
                    <input type="number" id="salePrice" name="salePrice" min="0" max="1000000" step="1" placeholder="Оставьте пустым если нет акции">
                    <p style="font-size: 12px; color: #888; margin-top: 5px;">Если указана — будет показываться вместо обычной цены</p>
                </div>

                <div class="form-row" style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label for="saleStart">Начало акции</label>
                        <input type="datetime-local" id="saleStart" name="saleStart">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="saleEnd">Конец акции</label>
                        <input type="datetime-local" id="saleEnd" name="saleEnd">
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Категория *</label>
                    <select id="category" name="category" required>
                        <option value="">Выберите категорию</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="stock">Остаток *</label>
                    <input type="number" id="stock" name="stock" min="0" max="100000" step="1" required>
                </div>

                <div class="form-group">
                    <label for="size">Размер карточки</label>
                    <select id="size" name="size">
                        <option value="normal">Обычная</option>
                        <option value="wide">Широкая</option>
                        <option value="large">Большая</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="image">Изображение</label>
                    <input type="file" id="image" name="image" accept="image/jpeg,image/png,image/gif,image/webp">
                    <img id="imagePreview" class="image-preview" alt="" style="display:none;">
                </div>

                <div class="form-group">
                    <label>Дополнительные фото</label>
                    <div class="images-gallery" id="imagesGallery">
                        <!-- Миниатюры доп. фото -->
                    </div>
                    <input type="file" id="extraImages" name="extraImages" accept="image/jpeg,image/png,image/gif,image/webp" multiple style="margin-top:10px;">
                    <p style="font-size:12px;color:#888;margin-top:5px;">Можно выбрать несколько файлов сразу</p>
                </div>

                <div class="form-group">
                    <label for="modelUrl">URL 3D модели (опционально)</label>
                    <input type="url" id="modelUrl" name="modelUrl" maxlength="500" placeholder="https://...">
                </div>

                <div id="formMessage" style="display:none;margin-bottom:15px;" role="alert" aria-live="polite"></div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Отмена</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
