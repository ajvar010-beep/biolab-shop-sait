<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — Biolab Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🌱 Biolab</h2>
                <p id="adminUsername">Администратор</p>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html"><span aria-hidden="true">📊</span><span>Главная</span></a>
                <a href="products.html"><span aria-hidden="true">🌿</span><span>Товары</span></a>
                <a href="orders.html"><span aria-hidden="true">📦</span><span>Заказы</span></a>
                <a href="categories.html" data-min-level="2"><span aria-hidden="true">📁</span><span>Категории</span></a>
                <a href="settings.html" data-min-level="2"><span aria-hidden="true">⚙️</span><span>Настройки</span></a>
                <a href="admins.html" data-min-level="2"><span aria-hidden="true">👥</span><span>Администраторы</span></a>
                <a href="audit.html" data-min-level="2"><span aria-hidden="true">📜</span><span>История</span></a>
                <a href="profile.html" class="active"><span aria-hidden="true">👤</span><span>Профиль</span></a>
                <a href="#" id="logoutBtn"><span aria-hidden="true">🚪</span><span>Выход</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>Мой профиль</h1>
            </div>

            <div class="card">
                <div class="card-header"><h2>Учётная запись</h2></div>
                <p>Логин: <strong id="profileUsername">—</strong></p>
                <p>Уровень доступа: <strong id="profileLevel">—</strong></p>
            </div>

            <div class="card">
                <div class="card-header"><h2>Сменить пароль</h2></div>
                <form id="passwordForm" autocomplete="off">
                    <div class="form-group">
                        <label for="currentPassword">Текущий пароль</label>
                        <input type="password" id="currentPassword" name="currentPassword" autocomplete="current-password">
                    </div>
                    <div class="form-group">
                        <label for="newPassword">Новый пароль (минимум 8 символов)</label>
                        <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" minlength="8">
                    </div>
                    <div id="formMessage" style="display:none;margin-bottom:15px;" role="alert" aria-live="polite"></div>
                    <div style="display:flex;gap:10px;justify-content:flex-end;">
                        <button type="submit" class="btn btn-primary" id="saveBtn">💾 Сменить пароль</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
