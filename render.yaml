# Render.com Blueprint
# Автоматический деплой Biolab

services:
  - type: web
    name: biolab-shop
    env: node
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        # ⚠️ Заменить на домен продакшена перед деплоем
        # Пример: https://biolab.ru,https://www.biolab.ru
        value: ""
      - key: ADMIN_USERNAME
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
