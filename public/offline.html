<!DOCTYPE HTML>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Нет соединения — Биолаборатория</title>
  <style>
    body { font-family: 'Inter', sans-serif; background: #1a1b1e; color: #a0a0a0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
    .container { padding: 40px; }
    h1 { color: #2ed573; font-size: 2rem; margin-bottom: 16px; }
    p { font-size: 1.1rem; margin-bottom: 24px; }
    .btn { display: inline-block; background: #2ed573; color: #1a1b1e; text-decoration: none; border: none; padding: 12px 32px; font-size: 1rem; font-weight: 600; border-radius: 4px; cursor: pointer; }
    .btn:hover { background: #26be65; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Нет соединения</h1>
    <p>Проверьте интернет-подключение и попробуйте снова.</p>
    <!-- Ссылка вместо button onclick: CSP запрещает инлайн-обработчики (scriptSrcAttr 'none') -->
    <a class="btn" href="/">Обновить</a>
  </div>
</body>
</html>
